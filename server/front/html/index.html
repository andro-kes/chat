<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #chat-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 800px;
        }

        #messages {
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        #input-container {
            display: flex;
        }

        #message-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #send-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #send-button:hover {
            background-color: #0056b3;
        }

        .message {
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 4px;
        }

        .message.sent {
            background-color: #d4edda;
            text-align: right;
        }

        .message.received {
            background-color: #cce5ff;
            text-align: left;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Чат</h1>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-container">
            <input type="text" id="message-input" placeholder="Введите сообщение">
            <button id="send-button">Отправить</button>
        </div>
    </div>

    <script>
        const socket = new WebSocket("ws://localhost:8080/chat"); 
        const messages = document.getElementById("messages");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");

        // Обработчик открытия соединения
        socket.onopen = function(event) {
            console.log("Соединение установлено");
        };

        // Обработчик получения сообщения
        socket.onmessage = function(event) {
            const message = event.data;
            console.log("Get message");
            displayMessage("andrey", message, "received");
        };

        // Обработчик закрытия соединения
        socket.onclose = function(event) {
            console.log("Соединение закрыто");
            displayMessage("Система", "Соединение с сервером потеряно.", "received");
        };

        // Обработчик ошибок
        socket.onerror = function(error) {
            console.error("Ошибка соединения:", error);
            displayMessage("Система", "Произошла ошибка соединения.", "received");
        };

        // Функция для отправки сообщения
        sendButton.onclick = function() {
            const text = messageInput.value;
            console.log("Send", messageInput.value)
            if (text) {
                // Отправляем сообщение на сервер
                socket.send(messageInput.value);
                messageInput.value = ""; // Очищаем поле ввода
            }
        };

        // Функция для отображения сообщения в чате
        function displayMessage(username, text, type) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", type);
            messageDiv.innerHTML = `<strong>${username}:</strong> ${text}`; // Добавляем имя пользователя
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight; // Прокручиваем вниз
        }
    </script>
</body>
</html>
